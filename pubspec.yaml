name: smartbank_ai
description: SmartBank AI Mobile Banking
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  camera: ^0.11.2
  image_picker: ^1.2.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  google_mlkit_face_detection: ^0.13.1
  google_fonts: ^6.3.0
  lottie: ^3.3.2
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/